name: Release Notes

on:
  # Run every Monday at 8:00 AM UTC — start of a new week
  schedule:
    - cron: '0 8 * * 1'
  # Also run on pushes to main (e.g. config or prompt changes)
  push:
    branches: [main]
  # Allow manual runs from the Actions tab, with an optional clean-build flag
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Discard cache and regenerate from scratch (last 6 months)'
        type: boolean
        default: false

# Prevent concurrent runs from clobbering the cache commit
concurrency:
  group: release-notes
  cancel-in-progress: false

permissions:
  contents: write   # Push cache commits back to main
  pages: write      # Deploy to GitHub Pages
  id-token: write   # OIDC token required by deploy-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clear cache (clean build)
        if: ${{ inputs.clean_build == true }}
        run: rm -f data/releases.json

      - name: Generate release notes
        env:
          # Secrets — set these in Settings → Secrets and variables → Actions
          # GH_APP_TOKEN: needs read:repo (or Contents read) access to services-v2 and a11y-testing
          GH_APP_TOKEN: ${{ secrets.GH_APP_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Repo list and site metadata — edit directly here
          GITHUB_REPOS: https://github.com/audioeye/services-v2@staging,https://github.com/audioeye/a11y-testing@main
          SITE_TITLE: AudioEye Release Notes
          SITE_DESCRIPTION: Latest updates and improvements to AudioEye products and services
          SITE_BASE_URL: https://audioeye.github.io/release-notes
        run: npm run generate

      - name: Commit cache updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/releases.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update release notes cache [skip ci]"
            git push
          else
            echo "No cache changes to commit."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
